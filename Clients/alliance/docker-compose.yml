version: '3.8'

services:
  # MySQL Database
  db:
    image: mysql:8.0
    container_name: conlyse-alliance-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-conlyse}
      MYSQL_USER: ${MYSQL_USER:-conlyse}
      MYSQL_PASSWORD: ${MYSQL_USER_PASSWORD:-conlysepassword}
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: conlyse-alliance-backend
    restart: unless-stopped
    environment:
      - FLASK_SECRET=${FLASK_SECRET:-your-flask-secret-key}
      - JWT_SECRET=${JWT_SECRET:-your-jwt-secret-key}
      - JWT_EXPIRATION_HOURS=${JWT_EXPIRATION_HOURS:-24}
      - MYSQL_USER=${MYSQL_USER:-conlyse}
      - MYSQL_USER_PASSWORD=${MYSQL_USER_PASSWORD:-conlysepassword}
      - MYSQL_IP_ADDR=db
      - MYSQL_DATABASE=${MYSQL_DATABASE:-conlyse}
      - API_PORT=5000
      - DEBUG=${DEBUG:-false}
      - CORS_ORIGINS=${CORS_ORIGINS:-*}
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "5000:5000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - REACT_APP_API_URL=/api
    container_name: conlyse-alliance-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"

volumes:
  mysql_data:

networks:
  default:
    name: conlyse-alliance-network
