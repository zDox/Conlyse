name: conflict_interface tests

on: [push, pull_request, workflow_dispatch]

permissions:
  contents: write

jobs:
  test:
    name: Run ConflictInterface tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: libs/conflict_interface

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install system build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -v -e .

      - name: Determine latest data version
        id: latest_version
        run: |
          echo "latest_version=$(python - << 'PY'
          from conflict_interface.versions import LATEST_VERSION
          print(LATEST_VERSION)
          PY
          )" >> "$GITHUB_OUTPUT"


      - name: get test data
        run: |
          mkdir -p tests/test_data
          VERSION=${{ steps.latest_version.outputs.latest_version }}
          wget -O /tmp/response_01.json "https://raw.githubusercontent.com/zDox/ConflictData/refs/heads/main/v${VERSION}/recording/response_01.json"
          python -c "import json; json.dump(json.load(open('/tmp/response_01.json'))['response'], open('tests/test_data/full_test_data_1_v${VERSION}.json', 'w'))"

          mkdir -p "tests/test_data/recording_v${VERSION}/static_map"
          for i in $(seq -w 1 10); do
            wget -O "tests/test_data/recording_v${VERSION}/response_${i}.json" \
              "https://raw.githubusercontent.com/zDox/ConflictData/refs/heads/main/v${VERSION}/recording/response_${i}.json"
          done
          MAP_ID=$(python -c "import json; print(json.load(open('tests/test_data/recording_v${VERSION}/response_01.json'))['map_id'])")
          wget -O "tests/test_data/recording_v${VERSION}/static_map/${MAP_ID}_${VERSION}.json" \
            "https://raw.githubusercontent.com/zDox/ConflictData/refs/heads/main/v${VERSION}/static_map/${MAP_ID}_${VERSION}.json"


      - name: Run tests with unittest
        env:
          TEST_ACCOUNT_USERNAME: ${{ secrets.TEST_ACCOUNT_USERNAME }}
          TEST_ACCOUNT_PASSWORD: ${{ secrets.TEST_ACCOUNT_PASSWORD }}
          TEST_ACCOUNT_EMAIL: ${{ secrets.TEST_ACCOUNT_EMAIL }}
          TEST_PROXY_URL: ${{secrets.TEST_PROXY_URL}}
        run: |
          python tests/run_tests.py