name: conflict_interface-tests

on:
  push:
    paths:
      - 'libs/conflict_interface/**'
      - '.github/workflows/conflict_interface-tests.yml'
  pull_request:
    paths:
      - 'libs/conflict_interface/**'
      - '.github/workflows/conflict_interface-tests.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  test:
    name: conflict_interface tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: libs/conflict_interface

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install system build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]


      - name: Run conflict_interface tests
        run: pytest -q
          
