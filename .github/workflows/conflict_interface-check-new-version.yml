name: conflict_interface check new version

on:
  schedule:
    - cron: "0 5 * * *"
  workflow_dispatch:

permissions:
  actions: write

jobs:
  check-new-version:
    runs-on: ubuntu-latest
    env:
      TEST_ACCOUNT_USERNAME: ${{ secrets.TEST_ACCOUNT_USERNAME }}
      TEST_ACCOUNT_PASSWORD: ${{ secrets.TEST_ACCOUNT_PASSWORD }}
      TEST_ACCOUNT_EMAIL: ${{ secrets.TEST_ACCOUNT_EMAIL }}
      TEST_PROXY_URL: ${{ secrets.TEST_PROXY_URL }}
      CONFLICT_DATA_TOKEN: ${{ secrets.CONFLICT_DATA_PUSH_TOKEN }}
      GH_TOKEN: ${{ github.token }}

    steps:
      - name: Checkout ConflictInterface
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install system build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential

      - name: Install ConflictInterface
        working-directory: libs/conflict_interface
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Check for new client version
        id: check_version
        run: |
          python scripts/check_new_version.py > script_output.txt

          if grep -qx "no_change" script_output.txt; then
            echo "has_new=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          RAW_OUTPUT=$(tail -n 1 script_output.txt)
          version=$(python -c 'import json, sys; d=json.loads(sys.argv[1]); print(d["version"])' "$RAW_OUTPUT")

          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "has_new=true" >> "$GITHUB_OUTPUT"

      - name: Stop if there was no new version
        if: steps.check_version.outputs.has_new != 'true'
        run: echo "No new client version; nothing to do."

      - name: Trigger create-version-data workflow
        if: steps.check_version.outputs.has_new == 'true'
        run: |
          gh workflow run conflict_interface-create-version-data.yml \
            -f version="${{ steps.check_version.outputs.version }}"
