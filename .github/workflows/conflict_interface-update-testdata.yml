name: conflict_interface update full test data

on:
  schedule:
    - cron: "0 5 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update-full-test-data:
    runs-on: ubuntu-latest
    env:
      TEST_ACCOUNT_USERNAME: ${{ secrets.TEST_ACCOUNT_USERNAME }}
      TEST_ACCOUNT_PASSWORD: ${{ secrets.TEST_ACCOUNT_PASSWORD }}
      TEST_ACCOUNT_EMAIL: ${{ secrets.TEST_ACCOUNT_EMAIL }}
      TEST_PROXY_URL: ${{ secrets.TEST_PROXY_URL }}
      CONFLICT_DATA_TOKEN: ${{ secrets.CONFLICT_DATA_PUSH_TOKEN }}

    steps:
      - name: Checkout ConflictInterface
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install system build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential

      - name: Install ConflictInterface
        working-directory: libs/conflict_interface
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Check client version and capture gamestate if needed
        id: check_version
        run: |
          python scripts/check_and_capture_gamestate.py > script_output.txt

          if grep -qx "no_change" script_output.txt; then
            echo "has_change=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          last_line=$(tail -n 1 script_output.txt)
          echo "RAW_OUTPUT=$last_line" >> "$GITHUB_ENV"

          version=$(python - << 'PY'
import json, os
raw = os.environ["RAW_OUTPUT"]
data = json.loads(raw)
print(data["version"])
PY
)

          file=$(python - << 'PY'
import json, os
raw = os.environ["RAW_OUTPUT"]
data = json.loads(raw)
print(data["file"])
PY
)

          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "file=$file" >> "$GITHUB_OUTPUT"
          echo "has_change=true" >> "$GITHUB_OUTPUT"

      - name: Stop if there was no change
        if: steps.check_version.outputs.has_change != 'true'
        run: echo "No new client version; skipping ConflictData update."

      - name: Clone ConflictData
        if: steps.check_version.outputs.has_change == 'true'
        run: |
          git clone "https://x-access-token:${CONFLICT_DATA_TOKEN}@github.com/zDox/ConflictData.git"

      - name: Add new full_test_data file and push branch
        if: steps.check_version.outputs.has_change == 'true'
        id: add_full_test_data
        run: |
          cd ConflictData
          VERSION="${{ steps.check_version.outputs.version }}"
          SRC_FILE="${{ steps.check_version.outputs.file }}"
          DEST_DIR="FullTestData"
          mkdir -p "$DEST_DIR"
          DEST_FILE="$DEST_DIR/full_test_data_1_v${VERSION}.json"
          cp "$SRC_FILE" "$DEST_FILE"

          BRANCH="add-full-test-data-v${VERSION}"
          git checkout -b "$BRANCH"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "$DEST_FILE"
          git commit -m "Add full_test_data_1_v${VERSION}.json"
          git push origin "$BRANCH"

          echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"

      - name: Create PR on ConflictData
        if: steps.check_version.outputs.has_change == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.CONFLICT_DATA_PUSH_TOKEN }}
        run: |
          gh pr create \
            --repo zDox/ConflictData \
            --head "${{ github.repository_owner }}:${{ steps.add_full_test_data.outputs.branch }}" \
            --base main \
            --title "Add full_test_data_1_v${{ steps.check_version.outputs.version }}.json" \
            --body "Automated update: add full test data for client version ${{ steps.check_version.outputs.version }}."

