name: api-tests

on:
  push:
    paths:
      - "services/api/**"
      - ".github/workflows/api-tests.yml"
  pull_request:
    paths:
      - "services/api/**"
      - ".github/workflows/api-tests.yml"
  workflow_dispatch:

jobs:
  test:
    name: Conlyse API — Lint & Test
    runs-on: ubuntu-latest
    permissions:
      contents: read

    defaults:
      run:
        working-directory: services/api

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-test.txt

      - name: Lint with ruff
        run: ruff check app/

      - name: Check formatting with black
        run: black --check app/

      - name: Run tests
        run: pytest tests/ -v
