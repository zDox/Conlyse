"_comment" = "Server Observer configuration for Docker deployment (example)"

WEBSHARE_API_TOKEN = "your-webshare-api-token"
max_parallel_recordings = 5
max_parallel_normal_recordings = 5
update_interval = 60
max_parallel_updates = 3
max_parallel_first_updates = 2
output_dir = "/app/recordings"
output_metadata_dir = "/app/recordings/metadata"

[redis]
host = "redis"
port = 6379
stream_name = "game_responses"

[game_finder]
enabled = true
scan_interval_seconds = 300
max_games_per_scan = 10

[database]
host = "postgres"
port = 5432
database = "replays"
user = "converter"
password = "changeme"

[storage]
[storage.s3]
endpoint_url = "http://minio:9000"
access_key = "minioadmin"
secret_key = "minioadmin"
bucket_name = "replays"
region = "us-east-1"

