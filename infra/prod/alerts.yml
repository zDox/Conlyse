groups:
  - name: server_converter
    rules:
      - alert: ConverterRunLoopError
        expr: rate(errors_total{error_type="run_loop"}[5m]) > 0
        for: 0m
        labels:
          severity: critical
        annotations:
          summary: "server_converter run loop crashed"
          description: "An unhandled exception propagated out of process_batch(). The service is backing off but may exit soon."

      - alert: ConverterRedisUnavailable
        expr: rate(errors_total{error_type="redis"}[5m]) > 0
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "server_converter cannot reach Redis"
          description: "Redis connection errors have been occurring for 5+ minutes. Check Redis container health."

      - alert: ConverterVersionPendingGames
        expr: errors_total{error_type="version_pending"} > 0
        for: 0m
        labels:
          severity: critical
        annotations:
          summary: "Games stuck waiting for conflict_interface update"
          description: "One or more games are blocked on an unsupported datatype version. Deploy a new server_converter with an updated conflict_interface to unblock them."

      - alert: ConverterHighErrorRate
        expr: rate(errors_total[10m]) > 0.1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "server_converter error rate is elevated"
          description: "More than 0.1 errors/sec over 10 minutes. Check logs for details."

  - name: server_observer
    rules:
      - alert: ObserverGameDropped
        expr: rate(games_failed_total[5m]) > 0
        for: 0m
        labels:
          severity: critical
        annotations:
          summary: "Observer dropped a game session after max retries"
          description: "A game session was permanently dropped. Check dead_letter.jsonl and observer logs for the error_type."

      - alert: ObserverHighRetryRate
        expr: rate(game_update_retries_total[10m]) > 0.5
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Observer game update retry rate is elevated"
          description: "More than 0.5 retries/sec over 10 minutes — possible network, proxy, or game server issues."

      - alert: ObserverNoActiveGames
        expr: sum(active_games) == 0
        for: 30m
        labels:
          severity: warning
        annotations:
          summary: "Observer has no active game recordings"
          description: "No games have been active for 30 minutes. This may be normal off-peak, or the observer may be stuck."

      - alert: ObserverGameServerDown
        expr: server_observer_down_server_count > 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "{{ $value }} game server address(es) unreachable — sessions frozen"
          description: "Per-address circuit breaker is open. Retry budgets are not consumed; sessions will auto-resume when the recovery probe confirms the server is reachable again."

      - alert: ObserverRedisPublishFailures
        expr: rate(server_observer_redis_publish_failures_total[5m]) > 0
        for: 3m
        labels:
          severity: critical
        annotations:
          summary: "Observer cannot publish game responses to Redis"
          description: "Game state is being fetched but not forwarded to the converter. Data loss is occurring. Check Redis container health."

  - name: server_converter_extended
    rules:
      - alert: ConverterHighConsumerLag
        expr: server_converter_redis_consumer_lag > 5000
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Converter Redis consumer lag is high ({{ $value }} messages)"
          description: "Stream cap is ~50,000 entries. At this lag, message loss risk is elevated if the converter stays behind."

  - name: host_resources
    rules:
      - alert: HostHighCpuUsage
        expr: 100 - (avg by (instance) (rate(node_cpu_seconds_total{mode="idle"}[5m])) * 100) > 85
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Host CPU usage is high ({{ $value | printf \"%.1f\" }}%)"
          description: "Average CPU utilization has been above 85% for 5+ minutes."

      - alert: HostHighMemoryUsage
        expr: (1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) * 100 > 85
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Host memory usage is high ({{ $value | printf \"%.1f\" }}%)"
          description: "Memory utilization has been above 85% for 5+ minutes. Check for runaway containers (e.g. migration/backfill jobs)."

      - alert: HostHighDiskUsage
        expr: (1 - (node_filesystem_avail_bytes{mountpoint="/"} / node_filesystem_size_bytes{mountpoint="/"})) * 100 > 85
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Host disk usage is high ({{ $value | printf \"%.1f\" }}%)"
          description: "Root filesystem usage has been above 85% for 10+ minutes. The converter's hot-storage response cache is a common cause of rapid growth — check disk before it blocks Redis writes (MISCONF)."
