global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alerts.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

scrape_configs:
  - job_name: server_observer
    static_configs:
      - targets:
          - conlyse-server-observer:9091
    labels:
      service: server_observer

  - job_name: server_converter
    static_configs:
      - targets:
          - conlyse-server-converter:8001
    labels:
      service: server_converter

  - job_name: node_exporter
    static_configs:
      - targets:
          - conlyse-node-exporter:9100
    labels:
      service: host
