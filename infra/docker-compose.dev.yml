version: '3.8'

# Development Docker Compose
# Infrastructure services only (PostgreSQL, Redis, MinIO)
# Use this for local development/debugging of Server Observer and Server Converter
#
# Quick Start:
#   1. cp .env.example .env (if not already done)
#   2. docker compose -f docker-compose.dev.yml up -d
#   3. Run server-observer and server-converter locally from your IDE
#
# Stop:
#   docker compose -f docker-compose.dev.yml down

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: conflict-postgres-dev
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-replays}
      POSTGRES_USER: ${POSTGRES_USER:-converter}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    volumes:
      - postgres-data-dev:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-converter} -d ${POSTGRES_DB:-replays}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Redis Stream
  redis:
    image: redis:7-alpine
    container_name: conflict-redis-dev
    command: redis-server --appendonly yes
    volumes:
      - redis-data-dev:/data
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # MinIO - S3 Compatible Storage
  minio:
    image: minio/minio:latest
    container_name: conflict-minio-dev
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    volumes:
      - minio-data-dev:/data
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    restart: unless-stopped

  # MinIO Client - Create bucket on startup
  minio-init:
    image: minio/mc:latest
    container_name: conflict-minio-init-dev
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set myminio http://minio:9000 ${MINIO_ROOT_USER:-minioadmin} ${MINIO_ROOT_PASSWORD:-minioadmin};
      mc mb myminio/${MINIO_BUCKET_NAME:-replays} --ignore-existing;
      mc anonymous set download myminio/${MINIO_BUCKET_NAME:-replays};
      exit 0;
      "

volumes:
  postgres-data-dev:
    driver: local
  redis-data-dev:
    driver: local
  minio-data-dev:
    driver: local
