# Full Stack Docker Compose
# Includes: PostgreSQL, Redis, MinIO (S3), Server Observer, Server Converter
#           Prometheus, Alertmanager, Loki, Promtail, Grafana
#
# Quick Start:
#   1. Copy .env.example to .env and customize
#   2. docker compose -f infra/docker-compose.yml up -d
#   3. Access MinIO console at http://localhost:9001 (minioadmin/minioadmin)
#   4. Access Grafana at http://localhost:3000 (admin / $GRAFANA_PASSWORD or "admin")

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: conlyse-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-replays}
      POSTGRES_USER: ${POSTGRES_USER:-converter}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-converter} -d ${POSTGRES_DB:-replays}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - conlyse-network
    restart: unless-stopped

  # Redis Stream
  redis:
    image: redis:7-alpine
    container_name: conlyse-redis
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - conlyse-network
    restart: unless-stopped

  # MinIO - S3 Compatible Storage
  minio:
    image: minio/minio:latest
    container_name: conlyse-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    volumes:
      - minio-data:/data
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - conlyse-network
    restart: unless-stopped

  # MinIO Client - Create bucket on startup
  minio-init:
    image: minio/mc:latest
    container_name: conlyse-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set myminio http://minio:9000 ${MINIO_ROOT_USER:-minioadmin} ${MINIO_ROOT_PASSWORD:-minioadmin};
      mc mb myminio/${MINIO_BUCKET_NAME:-replays} --ignore-existing;
      mc anonymous set download myminio/${MINIO_BUCKET_NAME:-replays};
      exit 0;
      "
    networks:
      - conlyse-network

  # Server Observer - Monitors games and publishes to Redis
  server-observer:
    image: ghcr.io/zdox/server-observer:latest
    container_name: conlyse-server-observer
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    volumes:
      - ./prod:/app/config:ro
      - observer-recordings:/app/recordings
      - observer-long-term-storage:/app/long_term_storage
      - observer-logs:/app/logs
    environment:
      - PYTHONUNBUFFERED=1
      - LOG_DIR=/app/logs
      - PYTHONMALLOC=malloc
    networks:
      - conlyse-network
    restart: unless-stopped
    security_opt:
      - label=disable

  # Conlyse API - FastAPI service for downloads & authentication
  api:
    image: ghcr.io/zdox/conlyse-api:latest
    container_name: conlyse-api
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-replays}
      POSTGRES_USER: ${POSTGRES_USER:-converter}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-change-me-in-production}
    ports:
      - "${API_PORT:-8000}:8000"
    networks:
      - conlyse-network
    restart: unless-stopped

  # Server Converter - Converts Redis streams to replay files
  server-converter:
    image: ghcr.io/zdox/server-converter:latest
    container_name: conlyse-server-converter
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-replays}
      POSTGRES_USER: ${POSTGRES_USER:-converter}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
      MINIO_BUCKET: ${MINIO_BUCKET_NAME:-replays}
      PYTHONMALLOC: malloc
    volumes:
      - ./prod/server-converter-config.json:/app/config.json:ro
      - converter-hot-storage:/data/hot_storage
    networks:
      - conlyse-network
    restart: unless-stopped
    security_opt:
      - label=disable

  # --- Observability Stack ---

  node-exporter:
    image: prom/node-exporter:latest
    container_name: conlyse-node-exporter
    command:
      - --path.rootfs=/host
      - --path.procfs=/host/proc
      - --path.sysfs=/host/sys
      - --collector.filesystem.mount-points-exclude=^/(dev|proc|sys|run/k3s/containerd/.+|var/lib/docker/.+)($$|/)
    volumes:
      - /:/host:ro,rslave
    pid: host
    networks:
      - conlyse-network
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    container_name: conlyse-prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.retention.time=30d
    volumes:
      - ./prod/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prod/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    networks:
      - conlyse-network
    restart: unless-stopped

  alertmanager:
    image: prom/alertmanager:latest
    container_name: conlyse-alertmanager
    volumes:
      - ./prod/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    ports:
      - "${ALERTMANAGER_PORT:-9093}:9093"
    networks:
      - conlyse-network
    restart: unless-stopped

  loki:
    image: grafana/loki:latest
    container_name: conlyse-loki
    command: -config.file=/etc/loki/local-config.yaml
    ports:
      - "${LOKI_PORT:-3100}:3100"
    volumes:
      - loki-data:/loki
    networks:
      - conlyse-network
    restart: unless-stopped

  promtail:
    image: grafana/promtail:latest
    container_name: conlyse-promtail
    volumes:
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./prod/promtail.yml:/etc/promtail/config.yml:ro
    networks:
      - conlyse-network
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: conlyse-grafana
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_PATHS_PROVISIONING: /etc/grafana/provisioning
    volumes:
      - grafana-data:/var/lib/grafana
      - ./prod/grafana/provisioning:/etc/grafana/provisioning:ro
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    depends_on:
      - prometheus
      - loki
    networks:
      - conlyse-network
    restart: unless-stopped

volumes:
  postgres-data:
    driver: local
  redis-data:
    driver: local
  minio-data:
    driver: local
  observer-recordings:
    driver: local
  observer-long-term-storage:
    driver: local
  observer-logs:
    driver: local
  converter-hot-storage:
    driver: local
  prometheus-data:
    driver: local
  loki-data:
    driver: local
  grafana-data:
    driver: local

networks:
  conlyse-network:
    driver: bridge
