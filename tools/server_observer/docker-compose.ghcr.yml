services:
  server-observer:
    # Use pre-built image from GitHub Container Registry
    image: ghcr.io/zdox/server-observer:latest
    container_name: server-observer
    volumes:
      # Mount configuration directory
      # Note: On SELinux systems (Fedora/RHEL/CentOS), add :z flag if you get permission errors
      # Example: - ./config:/app:z
      - ./config:/app
      # Mount recordings directory (optional - for persistent storage)
      - ./recordings:/app/recordings
      # Mount long-term storage directory (optional)
      - ./long_term_storage:/app/long_term_storage
    environment:
      # Python environment is pre-configured in the image
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    # Command can be customized here
    # command: ["server_observer", "/app/config.json", "/app/account_pool.json"]
    
    # Uncomment to see logs in real-time
    # logging:
    #   driver: "json-file"
    #   options:
    #     max-size: "10m"
    #     max-file: "3"
