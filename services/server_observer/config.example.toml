# Example configuration for server_observer_rust
# Copy this file to `config.toml` and fill in real values.

WEBSHARE_API_TOKEN = "your-webshare-api-token"
metrics_port = 9090
max_parallel_recordings = 5
max_parallel_normal_recordings = 5
max_parallel_updates = 3
max_parallel_first_updates = 2
update_interval = 60.0
output_dir = "./recordings"
output_metadata_dir = "./recordings/metadata"

[game_finder]
# Optional: enable automatic scanning for new games
enabled = true
scan_interval_seconds = 300.0
max_games_per_scan = 5
scenario_ids = [5796]
max_guest_games_per_account = -1

[database]
host = "localhost"
port = 5432
database = "replays"
user = "converter"
password = "changeme"

[redis]
host = "localhost"
port = 6379
stream_name = "game_responses"
# password = "optional-redis-password"

[storage]
[storage.s3]
endpoint_url = "https://your-s3-endpoint.example.com"
access_key = "your-access-key"
secret_key = "your-secret-key"
bucket_name = "replays"
region = "us-east-1"

